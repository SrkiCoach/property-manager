<p-card
  [header]="(property() ? 'PROPERTIES.EDIT_PROPERTY' : 'PROPERTIES.NEW_PROPERTY') | translate"
>
  <form [formGroup]="propertyForm" (ngSubmit)="save()">
    <div class="form-grid">
      <app-select-field
        id="customerId"
        label="PROPERTIES.CUSTOMER"
        [control]="propertyForm.controls.customerId"
      >
        <p-select
          inputId="customerId"
          formControlName="customerId"
          [options]="customers()"
          optionLabel="fullName"
          optionValue="id"
          [loading]="loadingCustomers()"
          [placeholder]="'PROPERTIES.SELECT_CUSTOMER' | translate"
          [showClear]="true"
          [filter]="true"
          filterBy="fullName"
          [filterPlaceholder]="'PROPERTIES.SEARCH_CUSTOMER' | translate"
          appendTo="body"
          class="w-full"
          (onChange)="clearServerError('customerId')"
        />
      </app-select-field>

      <app-text-field
        id="title"
        label="PROPERTIES.PROPERTY_TITLE"
        [control]="propertyForm.controls.title"
      >
        <input
          id="title"
          pInputText
          type="text"
          formControlName="title"
          (input)="clearServerError('title')"
        />
      </app-text-field>

      <app-text-field
        id="address"
        label="PROPERTIES.ADDRESS"
        [control]="propertyForm.controls.address"
      >
        <input
          id="address"
          pInputText
          type="text"
          formControlName="address"
          (input)="clearServerError('address')"
        />
      </app-text-field>

      <app-text-field id="city" label="PROPERTIES.CITY" [control]="propertyForm.controls.city">
        <input
          id="city"
          pInputText
          type="text"
          formControlName="city"
          (input)="clearServerError('city')"
        />
      </app-text-field>

      <app-text-field
        id="country"
        label="PROPERTIES.COUNTRY"
        [control]="propertyForm.controls.country"
      >
        <input
          id="country"
          pInputText
          type="text"
          formControlName="country"
          (input)="clearServerError('country')"
        />
      </app-text-field>

      <app-textarea-field
        id="notes"
        label="PROPERTIES.NOTES"
        [control]="propertyForm.controls.notes"
        class="form-field-full"
      >
        <textarea
          pTextarea
          id="notes"
          rows="5"
          formControlName="notes"
          class="w-full"
          (input)="clearServerError('notes')"
        ></textarea>
      </app-textarea-field>
    </div>

    <div class="form-actions">
      @if (property()) {
        <button
          pButton
          type="button"
          severity="secondary"
          [outlined]="true"
          [disabled]="submitting()"
          [label]="'COMMON.CANCEL' | translate"
          (click)="cancel()"
        ></button>
      }

      <button
        pButton
        type="submit"
        icon="pi pi-save"
        [loading]="submitting()"
        [disabled]="submitting() || loadingCustomers()"
        [label]="(property() ? 'COMMON.UPDATE' : 'COMMON.SAVE') | translate"
      ></button>
    </div>
  </form>
</p-card>
