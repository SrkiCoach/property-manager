<p-card [header]="(customer() ? 'CUSTOMERS.EDIT_CUSTOMER' : 'CUSTOMERS.NEW_CUSTOMER') | translate">
  <form [formGroup]="customerForm" (ngSubmit)="save()">
    <div class="form-grid">
      <app-text-field
        id="firstName"
        label="CUSTOMERS.FIRST_NAME"
        [control]="customerForm.controls.firstName"
      >
        <input
          id="firstName"
          pInputText
          type="text"
          formControlName="firstName"
          (input)="clearServerError('firstName')"
        />
      </app-text-field>

      <app-text-field
        id="lastName"
        label="CUSTOMERS.LAST_NAME"
        [control]="customerForm.controls.lastName"
      >
        <input
          id="lastName"
          pInputText
          type="text"
          formControlName="lastName"
          (input)="clearServerError('lastName')"
        />
      </app-text-field>

      <app-text-field id="email" label="COMMON.EMAIL" [control]="customerForm.controls.email">
        <input
          id="email"
          pInputText
          type="email"
          formControlName="email"
          (input)="clearServerError('email')"
        />
      </app-text-field>

      <app-text-field id="phone" label="COMMON.PHONE" [control]="customerForm.controls.phone">
        <input
          id="phone"
          pInputText
          type="text"
          formControlName="phone"
          (input)="clearServerError('phone')"
        />
      </app-text-field>
    </div>

    <div class="form-actions">
      @if (customer()) {
        <button
          pButton
          type="button"
          severity="secondary"
          [outlined]="true"
          [disabled]="submitting()"
          [label]="'COMMON.CANCEL' | translate"
          (click)="cancel()"
        ></button>
      }

      <button
        pButton
        type="submit"
        icon="pi pi-save"
        [loading]="submitting()"
        [disabled]="submitting()"
        [label]="(customer() ? 'COMMON.UPDATE' : 'COMMON.SAVE') | translate"
      ></button>
    </div>
  </form>
</p-card>
