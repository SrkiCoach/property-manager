<div class="customer-form-card">
  <p-card
      [header]="'CUSTOMERS.NEW_CUSTOMER' | translate">
    <form [formGroup]="customerForm" (ngSubmit)="save()" class="customer-form">
      <div class="form-grid">
        <div class="field">
          <label>{{ 'CUSTOMERS.FIRST_NAME' | translate }}</label>
          <input pInputText type="text" formControlName="firstName">
        </div>

        <div class="field">
          <label>{{ 'CUSTOMERS.LAST_NAME' | translate }}</label>
          <input pInputText type="text" formControlName="lastName">
        </div>

        <div class="field">
          <label>{{ 'COMMON.EMAIL' | translate }}</label>
          <input pInputText type="email" formControlName="email">
        </div>

        <div class="field">
          <label>{{ 'COMMON.PHONE' | translate }}</label>
          <input pInputText type="text" formControlName="phone">
        </div>
      </div>

      <div class="actions">
        <button
          pButton
          type="submit"
          icon="pi pi-save"
          [label]="'COMMON.SAVE' | translate">
        </button>
      </div>
    </form>
  </p-card>
</div>
