<p-card [header]="(customer() ? 'CUSTOMERS.EDIT_CUSTOMER' : 'CUSTOMERS.NEW_CUSTOMER') | translate">
  <form [formGroup]="customerForm" (ngSubmit)="save()">
    <div class="form-grid">
      <div class="form-field">
        <label for="firstName">
          {{ 'CUSTOMERS.FIRST_NAME' | translate }}
        </label>

        <input id="firstName" pInputText type="text" formControlName="firstName" />
      </div>

      <div class="form-field">
        <label for="lastName">
          {{ 'CUSTOMERS.LAST_NAME' | translate }}
        </label>

        <input id="lastName" pInputText type="text" formControlName="lastName" />
      </div>

      <div class="form-field">
        <label for="email">
          {{ 'COMMON.EMAIL' | translate }}
        </label>

        <input id="email" pInputText type="email" formControlName="email" />
      </div>

      <div class="form-field">
        <label for="phone">
          {{ 'COMMON.PHONE' | translate }}
        </label>

        <input id="phone" pInputText type="text" formControlName="phone" />
      </div>
    </div>

    <div class="form-actions">
      @if (customer()) {
        <button
          pButton
          type="button"
          severity="secondary"
          [outlined]="true"
          [disabled]="submitting()"
          [label]="'COMMON.CANCEL' | translate"
          (click)="cancel()"
        ></button>
      }

      <button
        pButton
        type="submit"
        icon="pi pi-save"
        [loading]="submitting()"
        [disabled]="submitting()"
        [label]="(customer() ? 'COMMON.UPDATE' : 'COMMON.SAVE') | translate"
      ></button>
    </div>
  </form>
</p-card>
